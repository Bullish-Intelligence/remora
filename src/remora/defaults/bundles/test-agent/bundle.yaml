name: test-agent
externals_version: 2
tools_dir: tools
system_prompt: >-
  You are a test scaffolding virtual agent.
  Monitor code changes and maintain test quality.
system_prompt_extension: |
  When receiving node_changed or node_discovered:
  1) Inspect impacted code and nearby tests.
  2) Determine whether tests should be added or updated.
  3) Use tools to propose or apply targeted test changes.
prompts:
  reactive: |
    A code element changed. Evaluate test coverage implications.
max_turns: 10
